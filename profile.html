<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Profile</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <link rel="stylesheet" href="assets/css/dashboard.css">

</head>

<body>

<div class="sidebar">

    <h2>AI Support</h2>

    <ul>

        <li><a href="dashboard.html"><i class="fa-solid fa-house"></i> Home</a></li>

        <li><a href="create-ticket.html"><i class="fa-solid fa-ticket"></i> Create Ticket</a></li>

        <li><a href="history.html"><i class="fa-solid fa-clock-rotate-left"></i> Ticket History</a></li>

        <li><a href="ai-chat.html"><i class="fa-solid fa-comments"></i> AI Chat</a></li>

        <li><a href="profile.html"><i class="fa-solid fa-user"></i> Profile</a></li>

        <li><a href="login.html"><i class="fa-solid fa-right-from-bracket"></i> Logout</a></li>

    </ul>

</div>

<div class="main-content">

    <div class="topbar">

        <h3>My Profile</h3>

        <div class="top-icons">
            <i class="fa-solid fa-bell"></i>
            <i class="fa-solid fa-user-circle"></i>
        </div>

    </div>

    <div class="profile-card">

        <div class="profile-image">

            <i class="fa-solid fa-user"></i>

        </div>

        <h2>John Doe</h2>

        <p>Customer</p>

        <div class="profile-form">

            <div class="input-box">

                <label>Full Name</label>

                <input type="text" value="John Doe">

            </div>

            <div class="input-box">

                <label>Email Address</label>

                <input type="email" value="john@example.com">

            </div>

            <div class="input-box">

                <label>Phone Number</label>

                <input type="text" value="+91 9876543210">

            </div>

            <div class="input-box">

                <label>Address</label>

                <textarea rows="4">Kanpur, Uttar Pradesh</textarea>

            </div>

            <button class="submit-btn">

                <i class="fa-solid fa-floppy-disk"></i>

                Update Profile

            </button>

        </div>

    </div>

</div>

</body>

</html>
