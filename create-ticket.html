<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Ticket</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <link rel="stylesheet" href="assets/css/dashboard.css">
</head>

<body>

<div class="sidebar">

    <h2>AI Support</h2>

    <ul>
        <li><a href="dashboard.html"><i class="fa-solid fa-house"></i> Home</a></li>

        <li><a href="create-ticket.html"><i class="fa-solid fa-ticket"></i> Create Ticket</a></li>

        <li><a href="history.html"><i class="fa-solid fa-clock-rotate-left"></i> Ticket History</a></li>

        <li><a href="ai-chat.html"><i class="fa-solid fa-comments"></i> AI Chat</a></li>

        <li><a href="profile.html"><i class="fa-solid fa-user"></i> Profile</a></li>

        <li><a href="#"><i class="fa-solid fa-right-from-bracket"></i> Logout</a></li>
    </ul>

</div>

<div class="main-content">

    <div class="topbar">
        <h3>Create Support Ticket</h3>

        <div class="top-icons">
            <i class="fa-solid fa-bell"></i>
            <i class="fa-solid fa-user-circle"></i>
        </div>
    </div>

    <div class="ticket-form">

        <h2>Create New Ticket</h2>

        <div class="input-box">
            <label>Subject</label>
            <input type="text" placeholder="Enter ticket subject">
        </div>

        <div class="input-box">
            <label>Category</label>
            <select>
                <option>Technical Issue</option>
                <option>Account Issue</option>
                <option>Payment</option>
                <option>Bug Report</option>
                <option>Other</option>
            </select>
        </div>

        <div class="input-box">
            <label>Priority</label>
            <select>
                <option>Low</option>
                <option>Medium</option>
                <option>High</option>
            </select>
        </div>

        <div class="input-box">
            <label>Description</label>
            <textarea rows="6" placeholder="Describe your problem..."></textarea>
        </div>

        <div class="input-box">
            <label>Attachment</label>
            <input type="file">
        </div>

        <button class="submit-btn">
            <i class="fa-solid fa-paper-plane"></i>
            Submit Ticket
        </button>

    </div>

</div>

</body>
</html>
