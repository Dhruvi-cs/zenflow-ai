<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chat</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <link rel="stylesheet" href="assets/css/dashboard.css">
</head>

<body>

<div class="sidebar">

    <h2>AI Support</h2>

    <ul>

        <li><a href="dashboard.html"><i class="fa-solid fa-house"></i> Home</a></li>

        <li><a href="create-ticket.html"><i class="fa-solid fa-ticket"></i> Create Ticket</a></li>

        <li><a href="history.html"><i class="fa-solid fa-clock-rotate-left"></i> Ticket History</a></li>

        <li><a href="ai-chat.html"><i class="fa-solid fa-comments"></i> AI Chat</a></li>

        <li><a href="profile.html"><i class="fa-solid fa-user"></i> Profile</a></li>

        <li><a href="#"><i class="fa-solid fa-right-from-bracket"></i> Logout</a></li>

    </ul>

</div>

<div class="main-content">

    <div class="topbar">

        <h3>AI Support Chat</h3>

        <div class="top-icons">
            <i class="fa-solid fa-bell"></i>
            <i class="fa-solid fa-user-circle"></i>
        </div>

    </div>

    <div class="chat-container">

        <div class="chat-header">
            🤖 AI Support Assistant
        </div>

        <div class="chat-body" id="chatBody">

            <div class="bot-message">
                👋 Hello! Welcome to AI Support. How can I help you today?
            </div>

        </div>

        <div class="chat-input">

            <input type="text"
                   id="message"
                   placeholder="Type your message...">

            <button onclick="sendMessage()">
                <i class="fa-solid fa-paper-plane"></i>
            </button>

        </div>

    </div>

</div>

<script>

    function sendMessage(){

        let input=document.getElementById("message");

        let text=input.value.trim();

        if(text=="") return;

        let chat=document.getElementById("chatBody");

        chat.innerHTML+=`
            <div class="user-message">${text}</div>
        `;

        chat.innerHTML+=`
            <div class="bot-message">
                Thank you! Your message has been received. Our AI assistant will help you shortly.
            </div>
        `;

        input.value="";

        chat.scrollTop=chat.scrollHeight;
    }

</script>
<script src="assets/js/script.js"></script>

</body>

</html>
